<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24192d">
  <meta name="description" content="Интерактивный подборщик веб-решения Darles Games: формат, срок и предварительная цена.">
  <title>Darles Games — подбор веб-решения</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="magic">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#" aria-label="Darles Games">
        <span class="brand-mark" aria-hidden="true">DG</span>
        <span class="brand-name">Darles Games</span>
      </a>

      <div class="topbar-controls">
        <div class="control-group theme-control" aria-label="Стиль демо">
          <span class="control-label" data-i18n="themeLabel">Стиль демо</span>
          <div class="segmented" role="group">
            <button type="button" data-theme-choice="magic" class="is-active">Magic</button>
            <button type="button" data-theme-choice="business" data-i18n="themeBusiness">Деловой</button>
            <button type="button" data-theme-choice="bright" data-i18n="themeBright">Яркий</button>
          </div>
        </div>
        <div class="segmented language-switch" role="group" aria-label="Language">
          <button type="button" data-language="ru" class="is-active">RU</button>
          <button type="button" data-language="en">EN</button>
        </div>
      </div>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>
  </div>

  <dialog id="examplesDialog" class="examples-dialog">
    <div class="dialog-head">
      <div>
        <p class="eyebrow" data-i18n="examplesEyebrow">Форматы</p>
        <h2 data-i18n="examplesTitle">Что можно создать</h2>
      </div>
      <button id="closeExamples" class="icon-button" type="button" aria-label="Закрыть">×</button>
    </div>
    <div id="examplesList" class="examples-list"></div>
    <div class="dialog-actions">
      <button id="dialogStart" class="button primary" type="button" data-i18n="startButton">Начать подбор</button>
    </div>
  </dialog>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
